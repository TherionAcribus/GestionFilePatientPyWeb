name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # --- Lint : socle d'erreurs critiques (bloquant) -------------------------
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Ruff check
        run: ruff check .

  # --- Tests automatisés (bloquant) ----------------------------------------
  # Les tests tournent SANS matériel : conftest.py stub escpos/pyusb et le
  # découplage matériel de Printer (device_factory) fournit une fausse
  # imprimante. `requests` (dépendance d'exécution) est requis pour importer
  # le module `printer` ; il est inclus dans requirements-dev.txt.
  test:
    name: tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest -q

  # --- Analyse de sécurité (advisory : n'échoue pas le build) --------------
  # bandit (SAST) et pip-audit (CVE des dépendances) sont exécutés en mode
  # informatif. Passez `continue-on-error` à false une fois la première base de
  # résultats triée pour en faire un gate bloquant.
  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tools
        run: pip install bandit==1.7.10 pip-audit==2.7.3
      - name: Bandit (SAST)
        continue-on-error: true
        run: bandit -r . -ll -x ./tests
      - name: pip-audit (dépendances)
        continue-on-error: true
        run: pip-audit -r requirements.txt
